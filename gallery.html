    <script>
      let currentItem = null;
      function openLightbox(src, title, desc) {
        currentItem = { src, title, desc };
        document.getElementById('lb-image').src = src;
        document.getElementById('lb-title').innerText = title;
        document.getElementById('lb-desc').innerHTML = desc;
        const btn = document.getElementById('lb-add-btn');
        btn.textContent = 'Добави в количката'; btn.style.background = '#1A1218';
        document.getElementById('lightbox').classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = ''; currentItem = null;
      }
      document.getElementById('lb-add-btn').addEventListener('click', function () {
        if (!currentItem) return;
        this.textContent = '✓ Добавено!'; this.style.background = '#D63484';
        setTimeout(() => { this.textContent = 'Добави в количката'; this.style.background = '#1A1218'; }, 1800);
      });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
      document.querySelectorAll('.artwork-card img').forEach(img => {
        img.addEventListener('click', () => openLightbox(img.src, img.dataset.title, img.dataset.desc));
      });
      function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('open');
        document.getElementById('cart-overlay').classList.toggle('open');
      }
    </script>
