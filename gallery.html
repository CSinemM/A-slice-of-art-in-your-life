    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
      <div class="lb-overlay" onclick="closeLightbox()"></div>

      <div class="lb-content">
        <div class="lb-img">
          <button class="lb-close" onclick="closeLightbox()">✕</button>
          <img id="lb-image" />
        </div>

        <div class="lb-info">
          <h3 id="lb-title"></h3>
          <p id="lb-desc"></p>
        </div>
      </div>
    </div>

    <script>
      function openLightbox(src, title, desc) {
        document.getElementById("lb-image").src = src;
        document.getElementById("lb-title").innerText = title;
        //document.getElementById("lb-desc").innerText = desc;
        document.getElementById("lb-desc").innerHTML = desc;

        document.getElementById("lightbox").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        document.getElementById("lightbox").classList.remove("open");
        document.body.style.overflow = "";
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeLightbox();
      });

      document.querySelectorAll(".artwork-card img").forEach((img) => {
        img.addEventListener("click", () => {
          openLightbox(img.src, img.dataset.title, img.dataset.desc);
        });
      });
    </script>
