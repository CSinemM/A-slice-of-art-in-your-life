    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
      <div class="lb-overlay" onclick="closeLightbox()"></div>

      <div class="lb-content">
        <div class="lb-img">
          <button class="lb-close" onclick="closeLightbox()">✕</button>
          <img id="lb-image" />
        </div>

        <div class="lb-info">
          <h3 id="lb-title"></h3>
          <div id="lb-desc"></div>
          <button class="lb-add-btn" id="lb-add-btn">Добави в количката</button>
        </div>
      </div>
    </div>

    <script>
      let currentItem = null;

      function openLightbox(src, title, desc) {
        currentItem = { src, title, desc };
        document.getElementById("lb-image").src = src;
        document.getElementById("lb-title").innerText = title;
        document.getElementById("lb-desc").innerHTML = desc;

        const btn = document.getElementById("lb-add-btn");
        btn.textContent = "Добави в количката";
        btn.style.background = "#1A1218";

        document.getElementById("lightbox").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        document.getElementById("lightbox").classList.remove("open");
        document.body.style.overflow = "";
        currentItem = null;
      }

      document.getElementById("lb-add-btn").addEventListener("click", function () {
        if (!currentItem) return;
        const btn = this;
        btn.textContent = "✓ Добавено!";
        btn.style.background = "#D63484";
        setTimeout(() => {
          btn.textContent = "Добави в количката";
          btn.style.background = "#1A1218";
        }, 1800);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeLightbox();
      });

      document.querySelectorAll(".artwork-card img").forEach((img) => {
        img.addEventListener("click", () => {
          openLightbox(img.src, img.dataset.title, img.dataset.desc);
        });
      });
    </script>
