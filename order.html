<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Поръчка - Asliceofartinyourlife</title>

</head>
<body>

<header>
    <h1>Asliceofartinyourlife</h1>

    <nav>
        <a href="index.html">Начало</a>
        <a href="gallery.html">Картини</a>
        <a href="prints.html">Принтове</a>
        <a href="style.html">Стил</a>
        <a href="order.html" class="active">Поръчка</a>
        <a href="about.html">За мен</a>
        <a href="contact.html">Контакти</a>
    </nav>
</header>

<section class="page-title">
    <h2>Поръчайте своя картина</h2>
    <p>персонализирана картина</p>
</section>

<section class="order-info">
    <h3>Как работи?</h3>
    <ol>
        <li>Попълвате формата</li>
        <li>Получавате цена и потвърждение</li>
        <li>Изработка до 2–4 седмици</li>
    </ol>
</section>

<section class="order-form">

    <form action="https://formspree.io/f/xpqwvlez" method="POST">

        <input type="hidden" name="_subject" value="Нова поръчка">

        <input type="text" name="name" placeholder="Вашето име" required>

        <input type="email" name="email" placeholder="Вашият имейл" required>

        <select name="size" required>
            <option value="">Изберете размер</option>
            <option>A4</option>
            <option>A3</option>
            <option>40x50 cm</option>
        </select>

        <select name="style" required>
            <option value="">Изберете стил</option>
            <option>Микс медия</option>
            <option>Поп арт</option>
            <option>Абстракт</option>
        </select>

        <input type="text" name="theme" placeholder="Тема / мотив" required>

        <textarea name="description" rows="5" placeholder="Опишете вашата идея" required></textarea>

        <button type="submit" class="btn">Изпрати поръчка</button>

    </form>

</section>

<footer>

</footer>

</body>
</html>
